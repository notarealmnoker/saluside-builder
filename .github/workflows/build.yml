name: SalusideOS Cloud Builder

on:
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Builder Config
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: false
          haskell: false
          large-packages: true
          docker-images: true

      - name: Update System
        run: sudo apt-get update

      - name: Install Tools
        run: sudo apt-get install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf zip zlib1g-dev

      - name: Install Google Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://googlesource.com > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Sync and Build Android Source
        run: |
          set -e
          mkdir -p aosp
          cd aosp
          echo "Настройка git..."
          git config --global user.name "nnoker"
          git config --global user.email "salusidemod@gmail.com"
          
          echo "Инициализация репозитория..."
          repo init -u https://github.com/LineageOS/android.git -b lineage-21 --depth=1 --no-repo-verify
          
          echo "Проверяем содержимое после repo init:"
          ls -la
          
          echo "Старт синхронизации..."
          repo sync -c -j4 --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync
          
          echo "Проверяем содержимое после repo sync:"
          ls -la
          
          source build/envsetup.sh
          lunch lineage_miatoll-userdebug
          mka bacon
