name: SalusideOs Cloud Builder

on:
  workflow_dispatch: 

jobs:
  build_android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Builder Config
      uses: actions/checkout@v4

    - name: Prepare Linux Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g==-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Install Google Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://googleapis.com > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Sync Android Source Code
      run: |
        git config --global user.name "mnoker"
        git config --global user.email "salusidemod@gmail.com"
        repo init -u https://github.com -b lineage-21 --git-lfs --depth=1
        repo sync -c -j$(nproc --all) --force-sync --noclone-bundle --no-tags
